<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TASKS//SYS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>To‑Do List</h1>
    </header>

    <section class="task-creator">
      <input
        id="task-title-input"
        class="text-input"
        type="text"
        placeholder="What do you need to do?"
      />
      <button id="add-task-btn" class="primary-btn">Add Task</button>
    </section>

    <section class="task-toolbar">
      <div class="toolbar-group">
        <label for="sort-select">Sort by</label>
        <select id="sort-select">
          <option value="created-desc">Created (newest first)</option>
          <option value="created-asc">Created (oldest first)</option>
          <option value="title-asc">Title (A → Z)</option>
          <option value="title-desc">Title (Z → A)</option>
          <option value="status">Status (incomplete first)</option>
        </select>
      </div>
      <div class="toolbar-group">
        <label>
          <input type="checkbox" id="hide-completed-checkbox" />
          Hide completed
        </label>
      </div>
    </section>

    <section class="task-list-container">
      <ul id="task-list" class="task-list"></ul>
      <p id="empty-state" class="empty-state">No tasks yet. Add one above.</p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
