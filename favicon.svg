    </filter>
  </defs>

  <rect width="256" height="256" rx="48" fill="#020617"/>
  <rect x="20" y="20" width="216" height="216" rx="40" fill="none" stroke="url(#g)" stroke-width="8" opacity="0.85"/>

  <g filter="url(#glow)" stroke="url(#g)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M72 136 L112 176 L190 92"/>
  </g>

  <g opacity="0.55" fill="url(#g)">
    <rect x="70" y="54" width="116" height="8" rx="4"/>
    <rect x="70" y="76" width="86" height="8" rx="4"/>
